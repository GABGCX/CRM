# ─── OPÇÃO B: Evolution API v2 + PostgreSQL ───────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       evolution
      POSTGRES_USER:     evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution_senha_forte}
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Servidor ──────────────────────────────────────────────
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_URL:-http://localhost:8080}

      # ── Autenticação ──────────────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-mude_esta_chave_secreta}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Banco: PostgreSQL ─────────────────────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution_senha_forte}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api

      DATABASE_SAVE_DATA_INSTANCE:    "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE:   "true"
      DATABASE_SAVE_DATA_CONTACTS:    "true"
      DATABASE_SAVE_DATA_CHATS:       "true"

      # ── Webhook aponta para o Nuxt ────────────────────────────
      WEBHOOK_GLOBAL_URL: ${NUXT_PUBLIC_APP_URL:-http://host.docker.internal:3000}/api/whatsapp/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"

      # ── Logs ─────────────────────────────────────────────────
      LOG_LEVEL: ERROR
      LOG_COLOR: "true"

    volumes:
      - evolution_data:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  evolution_data:
  evolution_pg_data: